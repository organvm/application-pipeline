    \ commit to 12 months including regional rotations</li> <li>Communicate fluently\
    \ in English (written and verbal)</li> <li>Can manage multiple concurrent projects\
    \ with competing deadlines</li> <li>Are authorized to work without sponsorship</li>\
    \ </ul> <p><strong>It would be awesome if you had:</strong></p> <ul> <li>Internship\
    \ or project experience in a customer-facing, consulting, or technical sales environment</li>\
    \ <li>Proficiency in Mandarin, Cantonese, or Bahasa Indonesia (for serving regional\
    \ customers)</li> <li>Scripting skills in Python, JavaScript, Bash, or similar</li>\
    \ <li>Hands-on experience with web technologies: HTML/CSS/JS, HTTP APIs, or cloud\
    \ platforms (AWS/GCP/Azure)</li> <li>Demonstrated ownership of technical projects\
    \ (GitHub portfolio, conference talks, open-source contributions)</li> </ul> <p><strong>Technologies\
    \ you'll work with:</strong></p> <p>Cloudflare's edge network, Workers (serverless),\
