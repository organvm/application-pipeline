    \ millions of websites and other Internet properties for customers ranging from\
    \ individual bloggers to SMBs to Fortune 500 companies. Cloudflare protects and\
    \ accelerates any Internet application online without adding hardware, installing\
    \ software, or changing a line of code. Internet properties powered by Cloudflare\
    \ all have web traffic routed through its intelligent global network, which gets\
    \ smarter with every request. As a result, they see significant improvement in\
    \ performance and a decrease in spam and other attacks. Cloudflare was named to\
    \ Entrepreneur Magazine\u2019s Top Company Cultures list and ranked among the\
    \ World\u2019s Most Innovative Companies by Fast Company.&nbsp;</p> <p>At Cloudflare,\
    \ we\u2019re not looking for people who wait for a polished roadmap; we\u2019\
    re looking for the builders who see the cracks in the Internet that everyone else\
    \ has simply learned to live with. We value candidates who have the instinct to\
    \ spot a \"normalized\" problem and the AI-native curiosity to create a solution\
    \ using the latest tools. Our culture is built on iteration, leveraging AI to\
    \ ship faster today to make it better tomorrow, while ensuring that every improvement,\
    \ no matter how small, is shared across the team to lift everyone up. If you\u2019\
    re the type of person who values curiosity over bureaucracy, and that AI is a\
    \ partner in solving tough problems to keep the Internet moving forward, you\u2019\
    ll fit right in.</p> </div></div><p><span style=\"font-size: 12pt;\"><strong>Available\
    \ location(s): </strong>Sydney, Australia</span></p> <p><strong>About the Role</strong></p>\
    \ <p>The Cloudflare Associate Solution Engineering Program is a 12-month rotational\
