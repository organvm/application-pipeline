    \ <li>Document customer requirements and translate them into solution architectures</li>\
    \ <li>Rotate between GCR, ANZ, and ASEAN customer teams every 4 months</li> <li>Contribute\
    \ to internal tooling, demo environments, or solution accelerators</li> </ul>\
    \ <p><strong>It is critical that you:</strong></p> <ul> <li>Have graduated within\
    \ the past 2 years (or have equivalent demonstrated technical experience through\
    \ boot camps, self-study, or professional work)</li> <li>Can explain core networking\
    \ concepts (e.g., how DNS resolution works, what happens when you visit a URL,\
