    \ deliver technical demonstrations, workshops, and proof-of-concepts. At the end\
    \ of the program, you'll join one of the regional teams as a Solution Engineer.</p>\
    \ <p><strong>In a typical week, you will:</strong></p> <ul> <li>Shadow customer\
    \ calls and technical deep-dives with Enterprise and Strategic accounts</li> <li>Build\
