    \ the most mission-oriented and passionate group of coworkers you\u2019ll ever\
    \ meet, this job is for you!</p> <p><strong>WHAT YOU'LL DO:</strong></p> <ul>\
    \ <li>Partner with the Salesforce Product Manager to ensure that the Salesforce\
    \ GovCloud platform is fully aligned with business objectives by maximizing the\
    \ platforms capabilities and architecting scalable solutions.</li> <li>Design\
    \ and customize Salesforce solutions on Salesforce Government Cloud Plus, ensuring\
    \ they align with industry best practices and meet the organization's objectives.</li>\
    \ <li>Support CRMA and configure new analytics dashboards, manage and create data\
    \ recipes as needed.</li> <li>Collaborate with developers to implement custom\
    \ solutions when necessary, ensuring scalability and maintainability.</li> <li>Develop\
    \ and maintain technical documentation, including system architecture, configurations,\
    \ and customizations.</li> <li>Automate business processes using Salesforce automation\
    \ tools such as LWC, flexi page, Formulas, Flow, Assignment Rules, Validation\
    \ Rules, Approval Processes, Email and Slack alerts.</li> <li>Build integrations\
    \ between Salesforce and external applications using REST, SOAP APIs, oAuth, SSO.</li>\
    \ <li>Partner with internal integration teams as needed when Salesforce needs\
    \ to consume or push data to other internal platforms (i.e.; ERP)</li> <li>Migrate\
    \ changes from development/testing environments to production and conduct required\
    \ smoke testing as needed.</li> <li>Provide support to end-users, fostering a\
    \ culture of self-sufficiency and user adoption.</li> <li>Adhere to defined coding\
    \ standards, maintain code documentation and develop well-structured, maintainable/scalable\
    \ and easy to understand code.</li> <li>Determine when Apex code is needed to\
    \ meet a capability end goal, always striving to seek out low code/no code options\
    \ when realistic.</li> <li>Perform data updates / migration using Data Loader\
    \ as needed.</li> <li>Interface with the Salesforce data backup and recovery tool\
    \ as needed.</li> <li>Stay current with new Salesforce technologies, platform\
    \ enhancements, releases, industry trends, implement best practices and engaging\
    \ in regular Salesforce release readiness activities.</li> </ul> <p><strong>REQUIRED\
    \ QUALIFICATIONS:</strong></p> <ul> <li>5 - 7 years of total IT experience with\
    \ at least 4+ years of Salesforce platform development experience</li> <li>Bachelor\u2019\
    s degree, preferably in Computer Science, Information Technology, Computer Engineering,\
    \ or related IT discipline; or equivalent experience.</li> <li>Strong Salesforce\
    \ customization and configuration experience, preferably in Sales Cloud. Experience\
    \ in Government Cloud a preferred.</li> <li>Hands on development experience using\
    \ Salesforce configuration and customizations including Apex, Triggers, Scheduled\
    \ and Batch classes, Formulas, Flow, Approval Processes, Validation and Assignment\
    \ Rules etc.</li> <li>Development experience in UI technologies like Bootstrap,\
    \ Lightening Design System (LDS), Lightening Components Development, jQuery, JavaScript,\
    \ HTML/CSS</li> <li>Strong foundation in Object-Oriented Programming (OOP) principles.</li>\
    \ <li>Proven experience with CI/CD version control systems, including GitHub</li>\
    \ <li>Experience with FFLIB (Apex Common Framework).</li> <li>Strong debugging\
    \ and performance optimization skills in Salesforce environments.</li> <li>Proven\
    \ integration experience using integration techniques - REST, SOAP APIs, oAuth\
    \ and SSO</li> <li>Experienced in Standard/Custom Object creation and relationships</li>\
    \ <li>Excellent analytical and problem-solving skills with keen attention to detail.</li>\
    \ <li>Knowledge of software development lifecycle and DevOps tools (i.e.; JIRA,\
    \ Salesforce DX, Salesforce CLI, etc.)</li> <li>A thorough understanding of Continuous\
    \ Integration/Continuous Delivery/Deployment"
