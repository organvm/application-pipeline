  description: "<div class=\"content-intro\"><h2><strong>About Anthropic</strong></h2>\
    \ <p>Anthropic\u2019s mission is to create reliable, interpretable, and steerable\
    \ AI systems. We want AI to be safe and beneficial for our users and for society\
    \ as a whole. Our team is a quickly growing group of committed researchers, engineers,\
    \ policy experts, and business leaders working together to build beneficial AI\
    \ systems.</p></div><h2 class=\"text-text-100 mt-3 -mb-1 text-[1.125rem] font-bold\"\
    >About the role</h2> <p class=\"font-claude-response-body break-words whitespace-normal\
    \ leading-[1.7]\">We're building the infrastructure that lets people <em>talk</em>\
    \ to Claude\u2014real-time, bidirectional voice conversations that feel natural,\
    \ responsive, and safe. This is foundational work for how millions of people will\
    \ interact with AI.</p> <p class=\"font-claude-response-body break-words whitespace-normal\
    \ leading-[1.7]\">The Voice Platform team designs and operates the serving systems,\
    \ streaming pipelines, and APIs that bring Anthropic's audio models from research\
    \ into production across Claude.ai, our mobile apps, and the Anthropic API. You'll\
    \ work at the intersection of real-time media, low-latency inference, and distributed\
    \ systems\u2014building infrastructure where every millisecond of latency is felt\
    \ by the user.</p> <p class=\"font-claude-response-body break-words whitespace-normal\
    \ leading-[1.7]\">We partner closely with the Audio research team, who train the\
    \ speech understanding and generation models, and with product teams shipping\
    \ voice experiences to users. Your job is to make those models fast, reliable,\
    \ and delightful to talk to at scale.</p> <h2 class=\"text-text-100 mt-3 -mb-1\
    \ text-[1.125rem] font-bold\">What you'll do</h2> <ul class=\"[li_&amp;]:mb-0\
    \ [li_&amp;]:mt-1 [li_&amp;]:gap-1 [&amp;:not(:last-child)_ul]:pb-1 [&amp;:not(:last-child)_ol]:pb-1\
    \ list-disc flex flex-col gap-1 pl-8 mb-3\"> <li class=\"whitespace-normal break-words\
    \ pl-2\">Design and build the real-time streaming infrastructure that powers voice\
    \ conversations with Claude\u2014ingesting microphone audio, orchestrating model\
    \ inference, and streaming synthesized speech back with minimal latency</li> <li\
    \ class=\"whitespace-normal break-words pl-2\">Build low-latency serving systems\
    \ for speech models, optimizing time-to-first-audio and end-to-end conversational\
    \ responsiveness</li> <li class=\"whitespace-normal break-words pl-2\">Develop\
    \ the public and internal APIs that expose voice capabilities to Claude.ai, mobile\
    \ clients, and third-party developers</li> <li class=\"whitespace-normal break-words\
    \ pl-2\">Own the audio transport layer\u2014codecs, jitter buffers, adaptive bitrate,\
    \ packet loss recovery\u2014so conversations stay smooth across unreliable networks</li>\
    \ <li class=\"whitespace-normal break-words pl-2\">Build observability and quality-measurement\
    \ systems for voice: latency distributions, audio quality metrics, interruption\
    \ handling, and turn-taking accuracy</li> <li class=\"whitespace-normal break-words\
    \ pl-2\">Partner with Audio research to move new model architectures from experiment\
    \ to production, and feed real-world performance data back into research</li>\
    \ <li class=\"whitespace-normal break-words pl-2\">Collaborate with mobile and\
    \ product engineering on client-side audio capture, playback, and the end-to-end\
    \ user experience</li> </ul> <h2 class=\"text-text-100 mt-3 -mb-1 text-[1.125rem]\
    \ font-bold\">You may be a good fit if you</h2> <ul class=\"[li_&amp;]:mb-0 [li_&amp;]:mt-1\
    \ [li_&amp;]:gap-1 [&amp;:not(:last-child)_ul]:pb-1 [&amp;:not(:last-child)_ol]:pb-1\
    \ list-disc flex flex-col gap-1 pl-8 mb-3\"> <li class=\"whitespace-normal break-words\
    \ pl-2\">Have 6+ years of experience building distributed systems, real-time infrastructure,\
    \ or platform services at scale</li> <li class=\"whitespace-normal break-words\
    \ pl-2\">Have shipped production systems where latency is measured in tens of\
    \ milliseconds and users notice when you miss</li> <li class=\"whitespace-normal\
    \ break-words pl-2\">Are comfortable working across the stack\u2014from transport\
    \ protocols and serving infrastructure up to the APIs product teams build on</li>\
    \ <li class=\"whitespace-normal break-words pl-2\">Are results-oriented, with\
    \ a bias toward flexibility and impact</li> <li class=\"whitespace-normal break-words\
    \ pl-2\">Pick up slack, even if it goes outside your job description</li> <li\
    \ class=\"whitespace-normal break-words pl-2\">Enjoy pair programming (we love\
    \ to pair!)</li> <li class=\"whitespace-normal break-words pl-2\">Care about the\
    \ societal impacts of voice AI and want to help shape how these systems are developed\
    \ responsibly</li> <li class=\"whitespace-normal break-words pl-2\">Are comfortable\
    \ with ambiguity\u2014voice is a fast-moving space, and you'll help define the\
    \ architecture as we learn what works</li> </ul> <h2 class=\"text-text-100 mt-3\
    \ -mb-1 text-[1.125rem] font-bold\">Strong candidates may also have experience\
    \ with</h2> <ul class=\"[li_&amp;]:mb-0 [li_&amp;]:mt-1 [li_&amp;]:gap-1 [&amp;:not(:last-child)_ul]:pb-1\
    \ [&amp;:not(:last-child)_ol]:pb-1 list-disc flex"
