    \ <p><strong>What will you be doing?&nbsp;</strong></p> <ul> <li>Work with your\
    \ team to build and roll out new features, then use the results to iterate and\
    \ improve.</li> <li>Drive projects from initial ideation all the way to operations\
    \ once it is in the hands of customers.</li> <li>Take on complex challenges and\
