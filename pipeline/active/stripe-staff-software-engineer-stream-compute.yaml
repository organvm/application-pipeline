  description: "<h2><strong>Who we are</strong></h2> <h2><strong>About Stripe</strong></h2>\
    \ <p>Stripe is a financial infrastructure platform for businesses. Millions of\
    \ companies\u2014from the world's largest enterprises to the most ambitious startups\u2014\
    use Stripe to accept payments, grow their revenue, and accelerate new business\
    \ opportunities. Our mission is to increase the GDP of the internet, and we have\
    \ a staggering amount of work ahead. That means you have an unprecedented opportunity\
    \ to put the global economy within everyone's reach while doing the most important\
    \ work of your career.</p> <h3><strong>About the team</strong></h3> <p>The Stream\
    \ Compute team at Stripe builds and operates the infrastructure, tooling, and\
    \ systems behind our <strong>Flink-powered stream processing systems</strong>.\
    \ We're at the heart of several core asynchronous workflows, operating at <em>significant\
    \ scale</em> and handling vast amounts of sensitive financial data. Our work powers\
    \ intricate processes involving <em>various critical financial operations and\
    \ real-time analytics</em>. We run globally distributed systems with high reliability\
    \ and performance to meet Stripe's scaling, availability, and product needs, and\
    \ we continually reduce operational toil by investing in automation and self-service\
    \ tooling for upgrades, maintenance, and day-to-day operations. The team is distributed\
    \ between Seattle, Toronto and remote locations.</p> <p>&nbsp;</p> <p>What makes\
    \ our team truly exciting is our <strong>commitment to our users</strong>: we\
    \ ensure no event is dropped, state integrity is preserved, and support exactly-once\
    \ processing as a first-class feature. Working at the <em>intersection of real-time\
    \ data processing and fintech innovation</em>, we continuously push the boundaries\
    \ of what's possible. Our focus on <strong>innovation, user experience, reliability,\
    \ and compliance</strong> drives increased ROI and operational excellence, making\
    \ us a <em>crucial part of Stripe's success</em>.</p> <h2><strong>What you'll\
    \ do</strong></h2> <p>You'll help define and deliver the next generation of Stripe's\
    \ Flink-first stream compute infrastructure\u2014driving innovation to meet extremely\
    \ high availability targets at global scale. Partnering with infrastructure engineers,\
    \ adjacent platform teams, and the product orgs that depend on Flink every day,\
    \ you'll set a long-term technical direction that scales with Stripe's growth\
    \ while enabling reliable, efficient operations for years to come. You'll work\
    \ on the hardest problems in operating Flink in production\u2014state management,\
    \ exactly-once processing, performance isolation, and automated recovery\u2014\
    so teams across Stripe can confidently build stateful stream processing applications\
    \ on top of it.</p> <h3><strong>Responsibilities</strong></h3> <ul> <li>Design,\
    \ build, and operate stream compute infrastructure with Apache Flink at the center,\
    \ alongside technologies like Kafka, Temporal, and AWS services</li> <li>Partner\
    \ with product and platform teams across Stripe to understand requirements, unblock\
    \ Flink adoption, and improve how stream processing infrastructure is used end-to-end</li>\
    \ <li>Define and implement operational best practices (e.g., shuffle sharding,\
    \ cellular architecture, load shedding, automated state recovery) to improve resilience\
    \ and reliability at scale</li> <li>Drive fleet-level automation and standardization\
    \ (\"pets\" to \"cattle\") through self-service workflows, safer rollouts, and\
    \ self-healing systems that reduce manual operations</li> <li>Lead initiatives\
    \ that raise the bar on Flink availability and state durability (e.g., multi-region\
    \ strategies, disaster recovery readiness, operational readiness reviews, incident\
    \ learning)</li> <li>Evaluate and productionize Flink ecosystem capabilities (e.g.,\
    \ SQL, connectors, state backends) to improve developer experience and scalability\
    \ without compromising reliability</li> <li>Work closely with the open source\
    \ community to identify opportunities for adopting new open source features as\
    \ well as contribute back to OSS</li> </ul> <h2><strong>Who you are</strong></h2>\
    \ <p>We're looking for someone who meets the minimum requirements to be considered\
    \ for the role. If you meet these requirements, you are encouraged to apply. The\
    \ preferred qualifications are a bonus, not a requirement.</p> <h3><strong>Minimum\
    \ requirements</strong></h3> <ul> <li>This is a Staff-level role - that typically\
    \ means 10+ years of experience building, operating, and evolving large-scale\
    \ production systems</li> <li>Experience as a technical lead for team(s) working\
    \ on distributed systems, including scaling them in fast-moving environments</li>\
    \ <li>Hands-on experience with big data technologies such as Flink, Spark, Kafka,\
    \ Pulsar, or Pinot</li> <li>Experience developing, maintaining and debugging distributed\
    \ systems built with open source tools</li> <li>Experience building and scaling\
    \ infrastructure as a product</li> <li>Strong software engineering skills and\
    \ a passion for Big Data Distributed Systems</"
