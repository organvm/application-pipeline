  description: "<p>The Public Sector software engineers (SWEs) create the core product\
    \ building blocks forward-deployed teams use to develop agentic capabilities that\
    \ function across multiple domains. SWEs responsibilities include building the\
    \ systems required to ingest and process federal datasets to support real-time\
    \ decision-making in contested environments. We develop novel agentic enabling\
    \ capabilities that includes:</p> <ul> <li>Create multi-layered guardrails around\
    \ agents</li> <li>Optimize data retrieval for agents</li> <li>Orchestrate fleets\
    \ of asynchronous agents</li> <li>Automatically alerts users to deviations in\
    \ data</li> <li>Illustrating how an agent reached a decision</li> </ul> <p><strong>As\
    \ a Senior Software Engineer, you will lead the development of a vertical feature\
    \ or a horizontal capability to include defining requirements with stakeholders\
    \ and implementation until it is accepted by the stakeholders.</strong></p> <p><strong>You\
    \ will:</strong> Lead the design and implementation of scalable backend systems\
    \ and distributed architectures for Federal customers.</p> <ul> <li>Manage the\
    \ full lifecycle of feature development from requirement definition to deployment\
    \ on classified networks.</li> <li>Direct the orchestration of asynchronous agent\
    \ fleets to meet mission requirements.</li> <li><strong>Lead customer engagements\
    \ to translate mission needs into technical requirements.</strong></li> <li><strong>Own\
    \ the communication with stakeholders to ensure implementation meets defined acceptance\
    \ criteria.</strong></li> <li>Conduct technical reviews and identify risks within\
    \ machine learning infrastructure and model serving.</li> <li>Drive the platform\
    \ roadmap by providing technical specifications for Federal product offerings.</li>\
    \ </ul> <p>Ideally you will have:&nbsp;</p> <ul> <li>Full Stack Development: Proficiency\
    \ in front-end, back-end development and infrastructure, including experience\
    \ with modern web development frameworks, programming languages, and databases</li>\
    \ <li>Cloud-Native Technologies: Familiarity with cloud platforms (e.g., AWS,\
    \ Azure, GCP) and experience in developing and deploying applications in a cloud-native\
    \ environment. Understanding of containerization (e.g., Docker) and container\
    \ orchestration (e.g., Kubernetes) is a plus</li> <li>Data Engineering: Knowledge\
    \ of ETL (Extract, Transform, Load) processes and experience in building data\
    \ pipelines to integrate and process diverse data sources. Understanding of data\
    \ modeling, data warehousing, and data governance principles</li> <li>AI Application\
    \ Integration: Familiarity with integrating Large Language Models (LLMs) and building\
    \ agentic workflows. Understanding of prompt engineering, retrieval-augmented\
    \ generation (RAG), and agent orchestration is beneficial.</li> <li>Problem Solving:\
    \ Strong analytical and problem-solving skills to understand complex challenges\
    \ and devise effective solutions. Ability to think critically, identify root causes,\
    \ and propose innovative approaches to overcome technical obstacles</li> <li>Collaboration\
    \ and Communication: Excellent interpersonal and communication skills to effectively\
    \ collaborate with cross-functional teams, stakeholders, and customers. Ability\
    \ to clearly articulate technical concepts to non-technical audiences and foster\
    \ a collaborative work environment</li> <li>Adaptability and Learning Agility:\
    \ Willingness to embrace new technologies, learn new skills, and adapt to defining\
    \ and evolving project requirements. Ability to quickly grasp and apply new concepts\
    \ and stay up-to-date with emerging trends in software engineering</li> </ul><div\
    \ class=\"content-pay-transparency\"><div class=\"pay-input\"><div class=\"description\"\
    ><p><em>Compensation packages at Scale for eligible roles include base salary,\
