  description: "<p><a href=\"https://www.mongodb.com/docs/atlas/atlas-sp/overview/\"\
    >Atlas Stream Processing</a> enables developers to continuously process streaming\
    \ data alongside critical application data stored in their database. It builds\
    \ on MongoDB\u2019s integrated developer data platform, so developers can stand\
    \ up a stream processor and database with just a few API calls and lines of code,\
    \ all fully managed. Our product is quickly gaining traction, and we are adding\
    \ core features that you will contribute to and own.</p> <p>The team owns the\
    \ C++ stream processing engine that powers Atlas Stream Processing, built on top\
    \ of MongoDB's Aggregation Framework. The team operates like a startup within\
    \ the company, a small group with real autonomy, responsible for everything from\
    \ the core execution engine and<a href=\"https://www.mongodb.com/docs/atlas/atlas-stream-processing/stream-aggregation-stages/\"\
    > stream processing stages</a>. We\u2019re looking for a Senior Software Engineer\
    \ to design, build, and evolve this execution engine.</p> <p>We're looking to\
    \ speak with candidates in the New York City area for our hybrid working model.</p>\
    \ <h3>Position Expectations</h3> <ul> <li>Design, build, and deliver core components\
    \ of the system in collaboration with other stakeholders</li> <li>Help shape architecture,\
    \ development practices, and escalation policies as the teams and the product\
    \ grow</li> <li>Mentor fellow engineers and assume ownership and accountability\
    \ of projects</li> </ul> <h3>Qualifications</h3> <ul> <li>Strong background in\
    \ database internals or building core components for data processing systems (including\
    \ query execution, storage engines, autotuning, and workload optimization)</li>\
    \ <li>5+ years of experience in building database services, distributed systems,\
    \ and/or foundational cloud services at scale</li> <li>Proven success in designing,\
    \ writing, testing, debugging, performance tuning, possessing a strong grip on\
    \ the foundational material of computer science, and maintaining distributed and/or\
    \ highly concurrent software systems in large, long-lived code bases</li> <li>Good\
    \ verbal and written technical communication skills, desire to collaborate with\
    \ colleagues, mentor fellow engineers, and assume project ownership and accountability</li>\
    \ <li>Track record of identifying problems, implementing solutions, and delivering\
    \ complex projects in distributed systems or databases</li> <li>Strong sense of\
    \ ownership, accountability, and pride</li> </ul> <h3>Nice to have</h3> <ul> <li>Hands\u2011\
    on modern C++ experience in performance\u2011sensitive systems</li> <li>Background\
    \ with stream processing or query engines. Exposure to systems such as Flink,\
    \ Spark, Beam, Kafka Streams, or database query engines</li> </ul> <h3>About MongoDB</h3>\
    \ <p>MongoDB is built for change, empowering our customers and our people to innovate\
    \ at the speed of the market. We have redefined the database for the AI era, enabling\
    \ innovators to create, transform, and disrupt industries with software. MongoDB\u2019\
    s unified database platform, the most widely available, globally distributed database\
    \ on the market, helps organizations modernize legacy workloads, embrace innovation,\
    \ and unleash AI. Our cloud-native platform, MongoDB Atlas, is the only globally\
    \ distributed, multi-cloud database and is available across AWS, Google Cloud,\
    \ and Microsoft Azure.</p> <p>With offices worldwide and over 60,000 customers,\
    \ including 75% of the Fortune 100 and AI-native startups, relying on MongoDB\
    \ for their most important applications, we\u2019re powering the next era of software.</p>\
    \ <p>Our compass at MongoDB is our <a href=\"https://www.mongodb.com/company\"\
    >Leadership Commitment,</a> guiding how and why we make decisions, show up for\
    \ each other, and win. It\u2019s what makes us MongoDB.&nbsp;</p> <p>To drive\
    \ the personal growth and business impact of our employees, we\u2019re committed\
    \ to developing a supportive and enriching culture for everyone. <a href=\"https://www.mongodb.com/company/blog/culture/employee-benefits-that-make-a-difference-at-mongodb\"\
    >From employee affinity groups, to fertility assistance and a generous parental\
    \ leave policy</a>, we value our employees\u2019 wellbeing and want to support\
    \ them along every step of their professional and personal journeys.<a href=\"\
    https://www.mongodb.com/blog/channel/culture\"> Learn more about what it\u2019\
    s like to work at MongoDB</a>, and help us make an impact on the world!</p> <p>MongoDB\
    \ is committed to providing any necessary accommodations for individuals with\
