name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-all:
    runs-on: ubuntu-latest
    # Serial pytest suite (~22 min on fast multicore) runs notably slower on a
    # 2-core hosted runner; 60 min gives headroom while still bounding hangs.
    # pytest-timeout (pyproject) catches any single test that truly hangs.
    timeout-minutes: 60
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Full verification gates (mandatory)
        run: |
          python scripts/verify_all.py | tee quality-verify.log

      - name: Recruiter filter — stale metrics & red flags (mandatory)
        run: |
          python scripts/recruiter_filter.py --base | tee quality-recruiter.log

      - name: Preflight snapshot (advisory)
        run: |
          python scripts/preflight.py --status staged | tee quality-preflight.log || true

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quality-artifacts-${{ github.run_id }}-${{ matrix.python-version }}
          if-no-files-found: ignore
          path: |
            quality-verify.log
            quality-recruiter.log
            quality-preflight.log

  full-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Full verification gates
        run: |
          python scripts/verify_all.py | tee quality-verify.log

      - name: Staged preflight snapshot (advisory)
        run: |
          python scripts/preflight.py --status staged | tee quality-preflight.log || true

      - name: Recruiter filter — full materials check (mandatory)
        run: |
          python scripts/recruiter_filter.py --full | tee quality-recruiter.log

      - name: Outcome learning drift snapshot
        run: |
          python scripts/outcome_learner.py --drift-check | tee quality-outcome-learner.log

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quality-regression-artifacts-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            quality-verify.log
            quality-preflight.log
            quality-recruiter.log
            quality-outcome-learner.log
